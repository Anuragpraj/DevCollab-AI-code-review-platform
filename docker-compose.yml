version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devcollab-postgres
    environment:
      POSTGRES_DB: devcollab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: devcollab-backend
    ports:
      - "8080:8080"
    environment:
      - DATABASE_URL=jdbc:postgresql://postgres:5432/devcollab
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - JWT_SECRET=${JWT_SECRET:-devcollab-local-secret-key-change-in-prod}
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: devcollab-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
