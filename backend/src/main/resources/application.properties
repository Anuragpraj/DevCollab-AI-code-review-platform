# ── Server ────────────────────────────────────────────────────────────────────
server.port=${PORT:8080}

# ── Database (PostgreSQL) ─────────────────────────────────────────────────────
# On Render: set DATABASE_URL env var (Render provides this automatically)
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/devcollab}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── JWT ───────────────────────────────────────────────────────────────────────
jwt.secret=${JWT_SECRET:devcollab-super-secret-jwt-key-must-be-at-least-32-chars}
jwt.expirationMs=86400000

# ── OpenRouter AI ─────────────────────────────────────────────────────────────
# Get free key at: https://openrouter.ai/keys
openrouter.api-key=${OPENROUTER_API_KEY:}
openrouter.api-url=https://openrouter.ai/api/v1/chat/completions
openrouter.site-url=${FRONTEND_URL:http://localhost:3000}
openrouter.site-name=DevCollab
# Fallback chain: tries left to right on rate-limit or failure
openrouter.models=anthropic/claude-3.5-sonnet,anthropic/claude-3-haiku,google/gemini-flash-1.5,meta-llama/llama-3.1-8b-instruct:free
openrouter.max-tokens=2048

# ── CORS ──────────────────────────────────────────────────────────────────────
# Comma-separated list; add your Render frontend URL here after deploy
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# ── Async thread pool ─────────────────────────────────────────────────────────
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=4

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.devcollab=INFO
logging.level.org.springframework.security=WARN

# ── Swagger / OpenAPI ─────────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ── Actuator (Render health checks) ──────────────────────────────────────────
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
