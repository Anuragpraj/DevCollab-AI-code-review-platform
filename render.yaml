# render.yaml — Deploy DevCollab to Render with one click
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (Spring Boot) ─────────────────────────────────
  - type: web
    name: devcollab-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: devcollab-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false          # You set this manually in Render dashboard
      - key: JWT_SECRET
        generateValue: true  # Render auto-generates a secure random value
      - key: CORS_ALLOWED_ORIGINS
        value: https://devcollab-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://devcollab-frontend.onrender.com

  # ── Frontend (React / Nginx) ──────────────────────────────
  - type: web
    name: devcollab-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: REACT_APP_API_URL
        value: https://devcollab-backend.onrender.com
      - key: REACT_APP_WS_URL
        value: https://devcollab-backend.onrender.com

# ── PostgreSQL Database ────────────────────────────────────
databases:
  - name: devcollab-db
    plan: free
    databaseName: devcollab
    user: devcollab_user
