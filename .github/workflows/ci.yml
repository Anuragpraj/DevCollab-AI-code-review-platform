name: CI — Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Java 17 + Maven)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: devcollab_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build & Test
        working-directory: backend
        env:
          DATABASE_URL: jdbc:postgresql://localhost:5432/devcollab_test
          DB_USERNAME: postgres
          DB_PASSWORD: postgres
          JWT_SECRET: ci-test-secret-key-that-is-long-enough-32chars
          OPENROUTER_API_KEY: dummy-key-for-tests
        run: mvn clean verify -q

  frontend:
    name: Frontend (Node 18 + React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: false

      - name: Install & Build
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:8080
          REACT_APP_WS_URL: http://localhost:8080
          CI: false
        run: |
          npm ci --silent
          npm run build
